name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          sed -i "s|%%GOOGLE_MAPS_API_KEY%%|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" index.html
          sed -i "s|%%ORS_API_KEY%%|${{ secrets.ORS_API_KEY }}|g" js/walking.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
