<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reisevei</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <div id="left-column">
    <div id="panel">
      <h2>Reisevei</h2>

      <div id="points-container"></div>

      <button id="add-point-btn" class="secondary-btn">+ Legg til punkt</button>

      <div class="field-group">
        <label for="departure-time">Avgangstid</label>
        <input type="datetime-local" id="departure-time" />
      </div>

      <button id="beregn-btn">Beregn</button>

      <div id="progress" class="hidden">
        <span id="progress-text">Beregner...</span>
      </div>

      <div id="error-msg" class="hidden"></div>

      <button id="result-btn" class="secondary-btn hidden">Se reiseveier</button>
    </div>

    <div id="result-panel" class="hidden">
      <button class="close-btn" aria-label="Lukk">&times;</button>
      <h3>Nåbare stopp</h3>
      <div id="result-content"></div>
    </div>
  </div>

  <div id="info-box">
    <button class="close-btn" aria-label="Lukk">&times;</button>
    <h3>Slik bruker du Reisevei</h3>
    <ol>
      <li>Klikk på kartet for å plassere ett eller flere punkt</li>
      <li>Sett ønsket reisetid (min) per punkt</li>
      <li>Velg avgangstid (valgfritt)</li>
      <li>Trykk «Beregn» for å se hvilke områder du kan nå med kollektiv</li>
    </ol>
  </div>

  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="js/entur.js"></script>
  <script src="js/isochrone.js"></script>
  <script src="js/app.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=REDACTED_GOOGLE_MAPS_KEY_ROTATED&libraries=marker&callback=initMap"
    async defer>
  </script>
</body>
</html>
